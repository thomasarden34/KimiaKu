  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;font-family:monospace}
    .label-top{color:#22c55e;font-size:10px;letter-spacing:.18em;margin-bottom:12px;opacity:.6}
    .robot-wrap{position:relative;width:min(280px,85vw)}
    .robot-svg{width:100%;height:auto;cursor:pointer;display:block}
    .speech-bubble{
      background:#cefdd3;;border:1px solid #22c55e;border-radius:12px;
      color:#22c55e;font-size:clamp(10px,2.5vw,12px);letter-spacing:.05em;
      padding:8px 12px;text-align:center;min-height:36px;
      display:flex;align-items:center;justify-content:center;
      position:relative;margin-top:10px;width:100%;
      transition:opacity .3s;
    }
    .speech-bubble::before{
      content:'';position:absolute;top:-8px;left:50%;transform:translateX(-50%);
      border:8px solid transparent;border-bottom-color:#22c55e;border-top:0;
    }
    .mood-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:12px;width:min(280px,85vw)}
    .mbtn{
      background:transparent;border:1px solid rgba(34,197,94,.25);
      color:#22c55e;font-size:clamp(9px,2.2vw,11px);padding:7px 4px;
      border-radius:20px;cursor:pointer;letter-spacing:.04em;
      transition:all .15s;font-family:monospace;
    }
    .mbtn:active,.mbtn.active{background:rgba(34,197,94,.15);border-color:#22c55e}
    .hint{color:rgba(34,197,94,.35);font-size:9px;margin-top:8px;letter-spacing:.08em;text-align:center}

    @keyframes antennaP{0%,100%{opacity:1}50%{opacity:.25}}
    @keyframes scanA{from{transform:translateY(-260px)}to{transform:translateY(260px)}}
    @keyframes speakJaw{0%,100%{d:path("M 62 182 Q 100 194 138 182")}50%{d:path("M 62 182 Q 100 206 138 182")}}
    @keyframes speakJaw2{0%,100%{d:path("M 62 182 Q 100 194 138 182")}33%{d:path("M 62 182 Q 100 210 138 182")}66%{d:path("M 62 188 Q 100 198 138 188")}}

    .mic-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 10px;
    width: min(280px, 85vw);
}


#micBtn {
    background: transparent;
    border: 1.5px solid rgba(34, 197, 94, 0.5);
    color: #22c55e;
    font-family: monospace;
    font-size: clamp(11px, 2.5vw, 13px);
    padding: 9px 24px;
    border-radius: 24px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.2s;
    width: 100%;
}

#micBtn:hover {
    background: rgba(34, 197, 94, 0.1);
    border-color: #22c55e;
}

/* Animasi saat mic aktif (mendengarkan) */
#micBtn.mic-active {
    background: rgba(239, 68, 68, 0.12);
    border-color: #ef4444;
    color: #ef4444;
    animation: micPulse 1s infinite;
}

@keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3); }
    50%       { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
}

/* Teks status di bawah tombol */
#micStatus {
    color: rgba(34, 197, 94, 0.45);
    font-size: 9px;
    letter-spacing: 0.08em;
    text-align: center;
    min-height: 14px;
}
  </style>
